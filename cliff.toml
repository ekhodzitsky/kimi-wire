# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
footer = """{% for release in releases %}\
{% if release.version %}{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/ekhodzitsky/kimi-wire/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/ekhodzitsky/kimi-wire/releases/tag/{{ release.version }}
{% endif %}{% endif %}\
{% endfor %}"""
trim = true
postprocessors = [
    { pattern = ".\n(## \\[)", replace = "${1}\n\n${2}" },
]

[git]
conventional_commits = true
filter_unconventional = false
commit_preprocessors = [
    { pattern = "\\s*\\(#[0-9]+\\)", replace = "" },
]
commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "^kimi-wire 0\\.1\\.0", group = "<!-- 0 -->Added" },
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^refactor", group = "<!-- 2 -->Changed" },
    { message = "^perf", group = "<!-- 2 -->Changed" },
    { message = "^docs: changelog", skip = true },
    { message = "^docs", group = "<!-- 0 -->Added" },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    { message = "^chore", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
]
filter_commits = true
topo_order_commits = true
sort_commits = "oldest"
