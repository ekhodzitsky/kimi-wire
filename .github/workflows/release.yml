name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --locked
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Publish to crates.io
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if curl -sf -H "User-Agent: kimi-wire-release" "https://crates.io/api/v1/crates/kimi-wire/${VERSION}" | grep -q "\"num\":\"${VERSION}\""; then
            echo "kimi-wire ${VERSION} already exists on crates.io — skipping publish."
            exit 0
          fi
          cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
